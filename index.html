<!DOCTYPE html>
<html>
<head>

<title>FixKart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>FixKart</h1>

<nav>
<a href="#services">Services</a>
<a href="#how">How it Works</a>
<a href="#workers">Workers</a>
</nav>

</header>


<section class="hero">

<h2>Book Trusted Local Services Instantly</h2>

<input id="search" placeholder="Search service (plumber, electrician...)">

<button onclick="searchService()">Find Service</button>

</section>


<section id="services">

<h2>Services</h2>

<div class="grid">

<div class="card" onclick="book('Electrician')">
<h3>Electrician</h3>
<p>Electrical repairs</p>
</div>

<div class="card" onclick="book('Plumber')">
<h3>Plumber</h3>
<p>Pipe repair</p>
</div>

<div class="card" onclick="book('AC Repair')">
<h3>AC Repair</h3>
<p>Cooling systems</p>
</div>

<div class="card" onclick="book('Cleaning')">
<h3>Home Cleaning</h3>
<p>House cleaning</p>
</div>

</div>

</section>


<section id="workers">

<h2>Available Workers</h2>

<div id="workerList"></div>

</section>


<div id="bookingBox" class="popup">

<h3>Confirm Booking</h3>

<p id="serviceName"></p>

<input placeholder="Enter your location">

<button onclick="confirmBooking()">Confirm Booking</button>

</div>


<script src="app.js"></script>

</body>
</html>
